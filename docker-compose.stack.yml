services:
  apk-rebuilder-d:
    image: ${APK_REBUILDER_IMAGE:-hkccr.ccs.tencentyun.com/plugins/apk-rebuilder:latest}
    networks:
      - proxy
      - internal
    volumes:
      - apk_rebuilder_data:/app/data
    environment:
      - APP_API_1_URL=https://api.d.xrteeth.com
      - APP_API_2_URL=https://api.d.tmrpp.com
      - PORT=3007
      - HOST=0.0.0.0
      - PLUGIN_MODE=true
      - APK_REBUILDER_UI_MODE=embed
      - HOST_API_BASE=https://api.d.xrteeth.com/api
      - HOST_PLUGIN_API_BASE=https://api.d.xrteeth.com/api-config/api
      - REDIS_HOST=redis-apk-rebuilder
      - REDIS_PORT=6379
    labels:
      - traefik.enable=true
      - "traefik.http.routers.apk-rebuilder_d.rule=Host(`apk-rebuilder.d.plugins.xrugc.com`)"
      - traefik.http.routers.apk-rebuilder_d.entrypoints=websecure
      - traefik.http.routers.apk-rebuilder_d.tls.certresolver=letsencrypt
      - traefik.http.services.apk-rebuilder_d.loadbalancer.server.port=80
      - traefik.docker.network=proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      redis-apk-rebuilder:
        condition: service_healthy

  redis-apk-rebuilder:
    image: redis:7-alpine
    networks:
      - internal
    volumes:
      - apk_rebuilder_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  proxy:
    external: true
  internal:
    driver: bridge

volumes:
  apk_rebuilder_redis_data:
  apk_rebuilder_data:
