server {
    listen 80;
    server_name apk-rebuilder.example.com;
    root /var/www/apk-rebuilder;
    index embed.html;
    client_max_body_size 500m;

    # Docker 内置 DNS，使用变量 proxy_pass 时必须指定 resolver
    # 解析延迟到请求时，避免启动阶段 DNS 未就绪导致 nginx 启动失败
    resolver 127.0.0.11 valid=30s ipv6=off;

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # plugin backend api
    location /plugin/ {
        proxy_pass http://127.0.0.1:3005/plugin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # __API_LOCATIONS__

    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /debug-env {
        access_log off;
        default_type application/json;
        alias /var/www/apk-rebuilder/debug-env.json;
    }

    location / {
        try_files $uri /embed.html;
    }
}
