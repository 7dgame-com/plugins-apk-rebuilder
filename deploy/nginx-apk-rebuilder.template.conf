server {
    listen 80;
    server_name apk-rebuilder.example.com;
    root /var/www/apk-rebuilder;
    index embed.html;
    client_max_body_size 500m;
    client_body_timeout 300s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    # Docker 内置 DNS，使用变量 proxy_pass 时必须指定 resolver
    # 解析延迟到请求时，避免启动阶段 DNS 未就绪导致 nginx 启动失败
    resolver 127.0.0.11 valid=30s ipv6=off;


    # plugin backend api
    location /plugin/ {
        proxy_pass http://127.0.0.1:3007/plugin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # local plugin api (must be before /api/* upstream failover)
    location = /api/upload {
        proxy_pass http://127.0.0.1:3007/api/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/tools {
        proxy_pass http://127.0.0.1:3007/api/tools;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /api-config/api/* -> host plugin config / permission API
    # 由 deploy/nginx-entrypoint-apk-rebuilder.sh 生成
    # __CONFIG_API_LOCATIONS__

    # __API_LOCATIONS__

    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /debug-env {
        access_log off;
        default_type application/json;
        alias /var/www/apk-rebuilder/debug-env.json;
    }

    location / {
        try_files $uri /embed.html;
    }
}
