services:
  apk-rebuilder:
    image: ${APK_REBUILDER_IMAGE:-hkccr.ccs.tencentyun.com/plugins/apk-rebuilder:latest}
    ports:
      - '3007:80'
    environment:
      - APP_API_1_URL=https://api.d.xrteeth.com
      - APP_API_2_URL=https://api.d.tmrpp.com
      - PORT=3005
      - HOST=0.0.0.0
      - PLUGIN_MODE=true
      - APK_REBUILDER_UI_MODE=embed
      - HOST_API_BASE=https://api.d.xrteeth.com
      - REDIS_HOST=redis-apk-rebuilder
      - REDIS_PORT=6379
    depends_on:
      redis-apk-rebuilder:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis-apk-rebuilder:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:16379:6379'
    volumes:
      - apk_rebuilder_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  apk_rebuilder_redis_data:
