name: Deploy

on:
  push:
    branches: [main, develop, publish]
  workflow_dispatch:

env:
  REGISTRY: hkccr.ccs.tencentyun.com
  IMAGE: hkccr.ccs.tencentyun.com/plugins/apk-rebuilder

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TENCENT_REGISTRY_USER }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=publish,enable=${{ github.ref == 'refs/heads/publish' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/publish' }}

      - name: Download Android tooling
        run: |
          set -eux
          mkdir -p tooling-cache
          curl -fsSL --connect-timeout 20 --max-time 300 --retry 5 --retry-delay 2 --retry-all-errors \
            "https://github.com/iBotPeaches/Apktool/releases/download/v2.11.1/apktool_2.11.1.jar" \
            -o tooling-cache/apktool.jar
          curl -fsSL --connect-timeout 20 --max-time 600 --retry 5 --retry-delay 2 --retry-all-errors \
            "https://dl.google.com/android/repository/build-tools_r34-linux.zip" \
            -o tooling-cache/build-tools.zip
          test -s tooling-cache/apktool.jar
          test -s tooling-cache/build-tools.zip

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
